<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverythingMatrix</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #141b2d;
            --bg-tertiary: #1e2843;
            --accent-primary: #00ff9d;
            --accent-secondary: #00d4ff;
            --text-primary: #e8ecf5;
            --text-secondary: #a0aec0;
            --border-color: #2d3b5a;
            --hover-bg: #253152;
            --error: #ff4757;
            --success: #00ff9d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 157, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 212, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 40px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .matrix-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .size-selector {
            margin-bottom: 30px;
        }

        .size-selector label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .size-inputs {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .size-input-group {
            flex: 1;
        }

        .size-input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.75rem;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(0, 255, 157, 0.1);
        }

        .matrix-container {
            margin-bottom: 30px;
        }

        .matrix-label {
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .matrix-grid {
            display: grid;
            gap: 8px;
            padding: 20px;
            background: var(--bg-primary);
            border-radius: 8px;
            border: 2px solid var(--border-color);
            max-width: 100%;
            overflow-x: auto;
        }

        .matrix-input {
            width: 70px;
            height: 70px;
            padding: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            text-align: center;
            transition: all 0.2s ease;
        }

        .matrix-input:focus {
            outline: none;
            border-color: var(--accent-secondary);
            background: var(--bg-tertiary);
            transform: scale(1.05);
        }

        .operations-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .operations-panel h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: var(--accent-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .quick-ops {
            display: grid;
            gap: 12px;
            margin-bottom: 30px;
        }

        .op-button {
            padding: 15px 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .op-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 157, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .op-button:hover::before {
            left: 100%;
        }

        .op-button:hover {
            background: var(--hover-bg);
            border-color: var(--accent-primary);
            transform: translateX(5px);
        }

        .op-button.active {
            background: linear-gradient(135deg, rgba(0, 255, 157, 0.2), rgba(0, 212, 255, 0.2));
            border-color: var(--accent-primary);
        }

        .search-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .search-box {
            position: relative;
            margin-bottom: 15px;
        }

        .search-input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-secondary);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        .operation-list {
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }

        .operation-list.show {
            display: block;
        }

        .operation-item {
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 5px;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .operation-item:hover {
            background: var(--hover-bg);
            border-color: var(--border-color);
        }

        .execute-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: 8px;
            color: var(--bg-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .execute-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 157, 0.3);
        }

        .execute-button:active {
            transform: translateY(0);
        }

        .result-section {
            margin-top: 40px;
            padding: 30px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-section.show {
            display: block;
        }

        .result-section h3 {
            color: var(--accent-primary);
            margin-bottom: 20px;
            font-family: 'Orbitron', sans-serif;
        }

        .scalar-input-section {
            margin-top: 20px;
            padding: 20px;
            background: var(--bg-primary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: none;
        }

        .scalar-input-section.show {
            display: block;
        }

        .scalar-input-section label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .operations-panel {
                position: static;
                max-height: none;
            }

            h1 {
                font-size: 2.5rem;
            }
        }

        .matrix-b-container {
            display: none;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid var(--border-color);
        }

        .matrix-b-container.show {
            display: block;
        }

        .error-message {
            padding: 15px;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid var(--error);
            border-radius: 8px;
            color: var(--error);
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>EverythingMatrix</h1>
            <p class="subtitle">Advanced Matrix Calculator</p>
        </header>

        <div class="main-content">
            <div class="matrix-section">
                <div class="size-selector">
                    <label>Matrix Dimensions</label>
                    <div class="size-inputs">
                        <div class="size-input-group">
                            <label>Rows</label>
                            <input type="number" id="rows" min="1" max="10" value="3">
                        </div>
                        <div class="size-input-group">
                            <label>Columns</label>
                            <input type="number" id="cols" min="1" max="10" value="3">
                        </div>
                    </div>
                </div>

                <div class="matrix-container">
                    <div class="matrix-label">Matrix A</div>
                    <div class="matrix-grid" id="matrixA"></div>
                </div>

                <div class="scalar-input-section" id="scalarSection">
                    <label for="scalarValue">Scalar Value</label>
                    <input type="number" id="scalarValue" step="0.01" value="1">
                </div>

                <div class="matrix-b-container" id="matrixBContainer">
                    <div class="matrix-label">Matrix B</div>
                    <div class="matrix-grid" id="matrixB"></div>
                </div>

                <div class="result-section" id="resultSection">
                    <h3>Result</h3>
                    <div id="resultContent"></div>
                </div>
            </div>

            <div class="operations-panel">
                <h2>Operations</h2>
                <div class="quick-ops">
                    <button class="op-button" data-op="addition">Addition</button>
                    <button class="op-button" data-op="rref">RREF</button>
                    <button class="op-button" data-op="multiplication">Multiplication</button>
                </div>

                <div class="search-section">
                    <div class="search-box">
                        <input type="text" class="search-input" id="searchInput" placeholder="Search for an operation...">
                        <span class="search-icon">🔍</span>
                    </div>
                    <div class="operation-list" id="operationList"></div>
                </div>

                <button class="execute-button" id="executeButton">Execute Operation</button>
            </div>
        </div>
    </div>

    <script>
        // All matrix operations
        const allOperations = [
            { name: 'Addition', id: 'addition', needsSecondMatrix: true },
            { name: 'Subtraction', id: 'subtraction', needsSecondMatrix: true },
            { name: 'Scalar Multiplication', id: 'scalar_mult', needsScalar: true },
            { name: 'Matrix Multiplication', id: 'multiplication', needsSecondMatrix: true },
            { name: 'Element-wise (Hadamard) Multiplication', id: 'hadamard', needsSecondMatrix: true },
            { name: 'Matrix Powers', id: 'matrix_power', needsScalar: true },
            { name: 'Element-wise Powers', id: 'element_power', needsScalar: true },
            { name: 'Transpose', id: 'transpose' },
            { name: 'Conjugate Transpose', id: 'conjugate_transpose' },
            { name: 'Row Echelon Form', id: 'ref' },
            { name: 'Reduced Row Echelon Form (RREF)', id: 'rref' },
            { name: 'Matrix Inverse', id: 'inverse' },
            { name: 'Determinant', id: 'determinant' },
            { name: 'Trace', id: 'trace' },
            { name: 'Rank', id: 'rank' },
            { name: 'Eigenvalues', id: 'eigenvalues' },
            { name: 'Eigenvectors', id: 'eigenvectors' },
            { name: 'Singular Value Decomposition (SVD)', id: 'svd' },
            { name: 'LU Factorization', id: 'lu' },
            { name: 'QR Factorization', id: 'qr' },
            { name: 'Cholesky Factorization', id: 'cholesky' },
            { name: 'Null Space', id: 'null_space' },
            { name: 'Column Space', id: 'column_space' },
            { name: 'Row Space', id: 'row_space' },
            { name: 'Gram-Schmidt Orthogonalization', id: 'gram_schmidt' },
            { name: 'Frobenius Norm', id: 'frobenius_norm' },
            { name: 'Condition Number', id: 'condition_number' },
            { name: 'Symmetry Test', id: 'is_symmetric' },
            { name: 'Diagonal Extraction', id: 'diagonal' },
            { name: 'Upper Triangular', id: 'upper_triangular' },
            { name: 'Lower Triangular', id: 'lower_triangular' }
        ];

        let currentOperation = null;
        let rows = 3, cols = 3;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateMatrixGrid();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('rows').addEventListener('change', updateMatrixGrid);
            document.getElementById('cols').addEventListener('change', updateMatrixGrid);
            document.getElementById('searchInput').addEventListener('input', filterOperations);
            document.getElementById('executeButton').addEventListener('click', executeOperation);

            // Quick operation buttons
            document.querySelectorAll('.op-button').forEach(btn => {
                btn.addEventListener('click', () => selectOperation(btn.dataset.op));
            });
        }

        function updateMatrixGrid() {
            rows = parseInt(document.getElementById('rows').value);
            cols = parseInt(document.getElementById('cols').value);

            createMatrixGrid('matrixA', rows, cols);
            
            if (currentOperation && allOperations.find(op => op.id === currentOperation)?.needsSecondMatrix) {
                createMatrixGrid('matrixB', rows, cols);
            }
        }

        function createMatrixGrid(containerId, r, c) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${c}, 70px)`;

            for (let i = 0; i < r; i++) {
                for (let j = 0; j < c; j++) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.step = '0.01';
                    input.className = 'matrix-input';
                    input.dataset.row = i;
                    input.dataset.col = j;
                    input.placeholder = '0';
                    container.appendChild(input);
                }
            }
        }

        function filterOperations() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const listContainer = document.getElementById('operationList');

            if (searchTerm === '') {
                listContainer.classList.remove('show');
                return;
            }

            const filtered = allOperations.filter(op => 
                op.name.toLowerCase().includes(searchTerm)
            );

            listContainer.innerHTML = '';
            filtered.forEach(op => {
                const item = document.createElement('div');
                item.className = 'operation-item';
                item.textContent = op.name;
                item.addEventListener('click', () => selectOperation(op.id));
                listContainer.appendChild(item);
            });

            listContainer.classList.add('show');
        }

        function selectOperation(opId) {
            currentOperation = opId;
            const operation = allOperations.find(op => op.id === opId);

            // Update UI
            document.querySelectorAll('.op-button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.op === opId);
            });

            // Show/hide matrix B
            const matrixBContainer = document.getElementById('matrixBContainer');
            if (operation.needsSecondMatrix) {
                matrixBContainer.classList.add('show');
                createMatrixGrid('matrixB', rows, cols);
            } else {
                matrixBContainer.classList.remove('show');
            }

            // Show/hide scalar input
            const scalarSection = document.getElementById('scalarSection');
            if (operation.needsScalar) {
                scalarSection.classList.add('show');
            } else {
                scalarSection.classList.remove('show');
            }

            // Hide search results
            document.getElementById('operationList').classList.remove('show');
            document.getElementById('searchInput').value = '';
        }

        function getMatrixValues(containerId) {
            const inputs = document.querySelectorAll(`#${containerId} .matrix-input`);
            const matrix = [];
            
            for (let i = 0; i < rows; i++) {
                matrix[i] = [];
                for (let j = 0; j < cols; j++) {
                    const value = inputs[i * cols + j].value;
                    matrix[i][j] = value === '' ? 0 : parseFloat(value);
                }
            }
            
            return matrix;
        }

        function executeOperation() {
            if (!currentOperation) {
                alert('Please select an operation first');
                return;
            }

            const matrixA = getMatrixValues('matrixA');
            const operation = allOperations.find(op => op.id === currentOperation);
            let result;

            try {
                if (operation.needsSecondMatrix) {
                    const matrixB = getMatrixValues('matrixB');
                    result = performTwoMatrixOperation(currentOperation, matrixA, matrixB);
                } else if (operation.needsScalar) {
                    const scalar = parseFloat(document.getElementById('scalarValue').value);
                    result = performScalarOperation(currentOperation, matrixA, scalar);
                } else {
                    result = performSingleMatrixOperation(currentOperation, matrixA);
                }

                displayResult(result);
            } catch (error) {
                displayError(error.message);
            }
        }

        function performTwoMatrixOperation(op, A, B) {
            switch(op) {
                case 'addition':
                    return matrixAdd(A, B);
                case 'subtraction':
                    return matrixSubtract(A, B);
                case 'multiplication':
                    return matrixMultiply(A, B);
                case 'hadamard':
                    return hadamardProduct(A, B);
                default:
                    throw new Error('Operation not implemented');
            }
        }

        function performScalarOperation(op, A, scalar) {
            switch(op) {
                case 'scalar_mult':
                    return scalarMultiply(A, scalar);
                case 'matrix_power':
                    return matrixPower(A, Math.round(scalar));
                case 'element_power':
                    return elementPower(A, scalar);
                default:
                    throw new Error('Operation not implemented');
            }
        }

        function performSingleMatrixOperation(op, A) {
            switch(op) {
                case 'transpose':
                    return transpose(A);
                case 'rref':
                    return rref(A);
                case 'ref':
                    return ref(A);
                case 'determinant':
                    return { value: determinant(A) };
                case 'trace':
                    return { value: trace(A) };
                case 'rank':
                    return { value: rank(A) };
                case 'inverse':
                    return inverse(A);
                case 'is_symmetric':
                    return { value: isSymmetric(A) ? 'Yes' : 'No' };
                case 'diagonal':
                    return { vector: getDiagonal(A) };
                case 'upper_triangular':
                    return upperTriangular(A);
                case 'lower_triangular':
                    return lowerTriangular(A);
                case 'frobenius_norm':
                    return { value: frobeniusNorm(A) };
                default:
                    throw new Error('Operation not yet implemented');
            }
        }

        // Matrix operations implementations
        function matrixAdd(A, B) {
            if (A.length !== B.length || A[0].length !== B[0].length) {
                throw new Error('Matrices must have the same dimensions');
            }
            return A.map((row, i) => row.map((val, j) => val + B[i][j]));
        }

        function matrixSubtract(A, B) {
            if (A.length !== B.length || A[0].length !== B[0].length) {
                throw new Error('Matrices must have the same dimensions');
            }
            return A.map((row, i) => row.map((val, j) => val - B[i][j]));
        }

        function scalarMultiply(A, scalar) {
            return A.map(row => row.map(val => val * scalar));
        }

        function matrixMultiply(A, B) {
            if (A[0].length !== B.length) {
                throw new Error('Invalid dimensions for multiplication');
            }
            const result = Array(A.length).fill(0).map(() => Array(B[0].length).fill(0));
            for (let i = 0; i < A.length; i++) {
                for (let j = 0; j < B[0].length; j++) {
                    for (let k = 0; k < A[0].length; k++) {
                        result[i][j] += A[i][k] * B[k][j];
                    }
                }
            }
            return result;
        }

        function hadamardProduct(A, B) {
            if (A.length !== B.length || A[0].length !== B[0].length) {
                throw new Error('Matrices must have the same dimensions');
            }
            return A.map((row, i) => row.map((val, j) => val * B[i][j]));
        }

        function transpose(A) {
            return A[0].map((_, i) => A.map(row => row[i]));
        }

        function rref(A) {
            const matrix = A.map(row => [...row]);
            const rows = matrix.length;
            const cols = matrix[0].length;
            let lead = 0;

            for (let r = 0; r < rows; r++) {
                if (lead >= cols) return matrix;

                let i = r;
                while (Math.abs(matrix[i][lead]) < 1e-10) {
                    i++;
                    if (i === rows) {
                        i = r;
                        lead++;
                        if (lead === cols) return matrix;
                    }
                }

                [matrix[i], matrix[r]] = [matrix[r], matrix[i]];

                const lv = matrix[r][lead];
                matrix[r] = matrix[r].map(val => val / lv);

                for (let i = 0; i < rows; i++) {
                    if (i !== r) {
                        const lv = matrix[i][lead];
                        matrix[i] = matrix[i].map((val, j) => val - lv * matrix[r][j]);
                    }
                }
                lead++;
            }

            return matrix;
        }

        function ref(A) {
            const matrix = A.map(row => [...row]);
            const rows = matrix.length;
            const cols = matrix[0].length;
            let lead = 0;

            for (let r = 0; r < rows; r++) {
                if (lead >= cols) return matrix;

                let i = r;
                while (Math.abs(matrix[i][lead]) < 1e-10) {
                    i++;
                    if (i === rows) {
                        i = r;
                        lead++;
                        if (lead === cols) return matrix;
                    }
                }

                [matrix[i], matrix[r]] = [matrix[r], matrix[i]];

                const lv = matrix[r][lead];
                matrix[r] = matrix[r].map(val => val / lv);

                for (let i = r + 1; i < rows; i++) {
                    const lv = matrix[i][lead];
                    matrix[i] = matrix[i].map((val, j) => val - lv * matrix[r][j]);
                }
                lead++;
            }

            return matrix;
        }

        function determinant(A) {
            const n = A.length;
            if (n !== A[0].length) throw new Error('Matrix must be square');
            if (n === 1) return A[0][0];
            if (n === 2) return A[0][0] * A[1][1] - A[0][1] * A[1][0];

            let det = 0;
            for (let j = 0; j < n; j++) {
                const minor = A.slice(1).map(row => row.filter((_, i) => i !== j));
                det += Math.pow(-1, j) * A[0][j] * determinant(minor);
            }
            return det;
        }

        function trace(A) {
            if (A.length !== A[0].length) throw new Error('Matrix must be square');
            return A.reduce((sum, row, i) => sum + row[i], 0);
        }

        function rank(A) {
            const rrefMatrix = rref(A);
            return rrefMatrix.filter(row => row.some(val => Math.abs(val) > 1e-10)).length;
        }

        function inverse(A) {
            const n = A.length;
            if (n !== A[0].length) throw new Error('Matrix must be square');
            
            const det = determinant(A);
            if (Math.abs(det) < 1e-10) throw new Error('Matrix is singular (non-invertible)');

            const augmented = A.map((row, i) => [...row, ...Array(n).fill(0).map((_, j) => i === j ? 1 : 0)]);
            const rrefAug = rref(augmented);
            return rrefAug.map(row => row.slice(n));
        }

        function matrixPower(A, n) {
            if (A.length !== A[0].length) throw new Error('Matrix must be square');
            if (n === 0) return A.map((row, i) => row.map((_, j) => i === j ? 1 : 0));
            if (n === 1) return A;
            
            let result = A;
            for (let i = 1; i < n; i++) {
                result = matrixMultiply(result, A);
            }
            return result;
        }

        function elementPower(A, power) {
            return A.map(row => row.map(val => Math.pow(val, power)));
        }

        function isSymmetric(A) {
            if (A.length !== A[0].length) return false;
            for (let i = 0; i < A.length; i++) {
                for (let j = i + 1; j < A.length; j++) {
                    if (Math.abs(A[i][j] - A[j][i]) > 1e-10) return false;
                }
            }
            return true;
        }

        function getDiagonal(A) {
            const n = Math.min(A.length, A[0].length);
            return Array(n).fill(0).map((_, i) => A[i][i]);
        }

        function upperTriangular(A) {
            return A.map((row, i) => row.map((val, j) => j >= i ? val : 0));
        }

        function lowerTriangular(A) {
            return A.map((row, i) => row.map((val, j) => j <= i ? val : 0));
        }

        function frobeniusNorm(A) {
            return Math.sqrt(A.reduce((sum, row) => 
                sum + row.reduce((rowSum, val) => rowSum + val * val, 0), 0));
        }

        function displayResult(result) {
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');
            
            resultSection.classList.add('show');

            if (Array.isArray(result)) {
                // Matrix result
                const matrixHtml = `
                    <div class="matrix-grid" style="grid-template-columns: repeat(${result[0].length}, 70px);">
                        ${result.map(row => row.map(val => 
                            `<input type="text" class="matrix-input" value="${val.toFixed(4)}" readonly>`
                        ).join('')).join('')}
                    </div>
                `;
                resultContent.innerHTML = matrixHtml;
            } else if (result.value !== undefined) {
                // Scalar result
                resultContent.innerHTML = `
                    <div style="font-size: 1.5rem; color: var(--accent-primary); text-align: center; padding: 20px;">
                        ${typeof result.value === 'number' ? result.value.toFixed(6) : result.value}
                    </div>
                `;
            } else if (result.vector) {
                // Vector result
                resultContent.innerHTML = `
                    <div style="color: var(--text-secondary);">
                        [${result.vector.map(v => v.toFixed(4)).join(', ')}]
                    </div>
                `;
            }
        }

        function displayError(message) {
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');
            
            resultSection.classList.add('show');
            resultContent.innerHTML = `<div class="error-message">${message}</div>`;
        }
    </script>
</body>
</html>
